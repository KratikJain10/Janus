# Local backing services for Janus. Run: docker compose up -d
services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    # why: pgvector image (Postgres 16 + the vector extension) for the semantic
    # cache; drop-in compatible with the existing pg16 data volume.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: janus
      POSTGRES_PASSWORD: janus
      POSTGRES_DB: janus
    ports:
      - '5432:5432'
    volumes:
      - janus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U janus']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  janus_pgdata:
